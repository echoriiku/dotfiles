# Riiku Alacritty terminal #

# Window settings #
window:
  padding:
    x: 5
    y: 5
    dinamic-padding: true
  decorations: none
  # dimensions:
  #   columns: 100
  #   lines: 35
  startup_mode: Maximized

# Font settings #
font:
  size: 13
  offset:
    y: -1
    x: -1
  normal:
    family: CartographCF Nerd Font
    style: Regular

# Cursor settings #
cursor:
  style:
    shape: Beam
    blinking: On
    blink-interval: 300

# Selection settings #
selection:
  save_to_clipboard: true

# Config settings #
live_config_realod: true

# New instance inside current folder #
key_bindings:
  - { key: Return, mods: Shift, action: SpawnNewInstance }

# TokyoNight Alacritty Colors
colors:
  # Default colors
  primary:
    background: '0x1a1b26'
    foreground: '0xc0caf5'

  # Normal colors
  normal:
    black:   '0x15161e'
    red:     '0xf7768e'
    green:   '0x9ece6a'
    yellow:  '0xe0af68'
    blue:    '0x7aa2f7'
    magenta: '0xbb9af7'
    cyan:    '0x7dcfff'
    white:   '0xa9b1d6'

  # Bright colors
  bright:
    black:   '0x414868'
    red:     '0xf7768e'
    green:   '0x9ece6a'
    yellow:  '0xe0af68'
    blue:    '0x7aa2f7'
    magenta: '0xbb9af7'
    cyan:    '0x7dcfff'
    white:   '0xc0caf5'

  indexed_colors:
    - { index: 16, color: '0xff9e64' }
    - { index: 17, color: '0xdb4b4b' }