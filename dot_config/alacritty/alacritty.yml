# Riiku Alacritty terminal #

# Window settings #
window:
  padding:
    x: 5
    y: 5
    dinamic-padding: true
  decorations: none
  # dimensions:
  #   columns: 100
  #   lines: 35
  startup_mode: Maximized

# Font settings #
font:
  size: 12
  offset:
    y: -1
    x: -1
  normal:
    family: CartographCF Nerd Font
    style: Regular

# Cursor settings #
cursor:
  style:
    shape: Beam
    blinking: On
    blink-interval: 300

# Selection settings #
selection:
  save_to_clipboard: true

# Config settings #
live_config_realod: true

# New instance inside current folder #
key_bindings:
  - { key: Return, mods: Shift, action: SpawnNewInstance }

# TokyoNight Alacritty Colors
colors:
  primary:
    background: "0x191724"
    foreground: "0xe0def4"
  cursor:
    text: "0xe0def4"
    cursor: "0x524f67"
  vi_mode_cursor:
    text: "0xe0def4"
    cursor: "0x524f67"
  line_indicator:
    foreground: None
    background: None
  selection:
    text: "0xe0def4"
    background: "0x403d52"
  normal:
    black: "0x26233a"
    red: "0xeb6f92"
    green: "0x31748f"
    yellow: "0xf6c177"
    blue: "0x9ccfd8"
    magenta: "0xc4a7e7"
    cyan: "0xebbcba"
    white: "0xe0def4"
  bright:
    black: "0x6e6a86"
    red: "0xeb6f92"
    green: "0x31748f"
    yellow: "0xf6c177"
    blue: "0x9ccfd8"
    magenta: "0xc4a7e7"
    cyan: "0xebbcba"
    white: "0xe0def4"
  hints:
    start:
      foreground: "#908caa"
      background: "#1f1d2e"
    end:
      foreground: "#6e6a86"
      background: "#1f1d2e"
